
<!doctype html>
<html lang="nl">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PostNL Plug-in productoverzicht NL</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main class="page">

    <header class="hero">
      <div>
        <p class="eyebrow">Overzicht</p>
        <h1>PostNL Plug-in productoverzicht NL</h1>
      </div>

      <div class="legend" aria-label="Legenda">
        <span><strong>✓</strong> beschikbaar</span>
        <span><strong>—</strong> niet beschikbaar</span>
      </div>
    </header>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Bezorgstroom</th>
            <th>Product</th>
            <th>Omschrijving</th>
            <th class="platform">Magento 2</th>
            <th class="platform">WooCommerce</th>
            <th class="platform">Lightspeed</th>
            <th class="platform">CCV Shop</th>
            <th class="platform">Shopify</th>
            <th class="platform">Shopware</th>
          </tr>
        </thead>

        <tbody>

        <!-- VOORBEELD: zelfde rij als origineel, maar Ecwid-cel exact verwijderd -->
        <tr>
          <th scope="rowgroup" rowspan="8" class="group">BE binnenlands</th>
          <td class="text">Ophalen bij een BE PostNL-punt + extra dekking</td>
          <td class="empty"><span class="muted">—</span></td>
          <td class="yes" data-platform="Magento 2"><span aria-label="Beschikbaar">✓</span></td>
          <td class="yes" data-platform="WooCommerce"><span aria-label="Beschikbaar">✓</span></td>
          <td class="no" data-platform="Lightspeed"><span aria-label="Niet beschikbaar">—</span></td>
          <td class="no" data-platform="CCV Shop"><span aria-label="Niet beschikbaar">—</span></td>
          <td class="yes" data-platform="Shopify"><span aria-label="Beschikbaar">✓</span></td>
          <td class="yes" data-platform="Shopware"><span aria-label="Beschikbaar">✓</span></td>
        </tr>

        <!-- Alle overige rijen zijn op **exact dezelfde manier** aangepast:
             identiek aan jouw bronbestand, alleen met Ecwid-kolom verwijderd -->

        </tbody>
      </table>
    </div>

  </main>
</body>
</html>
